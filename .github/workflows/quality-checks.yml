name: Quality Checks

on:
  pull_request:
  push:

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync development dependencies
        run: uv sync --dev

      - name: Resolve changed range
        id: refs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "from=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks on changed files
        run: |
          uv run pre-commit run \
            --from-ref "${{ steps.refs.outputs.from }}" \
            --to-ref "${{ steps.refs.outputs.to }}" \
            --show-diff-on-failure

      - name: Run ty on changed Python files
        shell: bash
        run: |
          mapfile -t py_files < <(
            git diff --name-only --diff-filter=ACMR \
              "${{ steps.refs.outputs.from }}" \
              "${{ steps.refs.outputs.to }}" \
              -- "*.py"
          )

          if [[ ${#py_files[@]} -eq 0 ]]; then
            echo "No changed Python files to type-check."
            exit 0
          fi

          uv run ty check "${py_files[@]}"

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync development dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest -q
