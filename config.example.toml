[qbittorrent]
url = "http://127.0.0.1:8080"
username = "admin"
password = "your-web-ui-password"
request_timeout = 15

[logging]
file = "./logs/qb-helper.log"
level = "INFO"
retention_hours = 24
rotate_when = "H"
rotate_interval = 1

[runtime]
state_file = "./data/qb-helper-state.json"
dry_run = true

[modules.stalled_cleanup]
enabled = true

[modules.stalled_cleanup.options]
candidate_seconds = 3600
delete_seconds = 7200
candidate_tag = "stalled-long"

[modules.disk_space_cleanup]
enabled = false

[modules.disk_space_cleanup.options]
min_free_space_gb = 20

[modules.value_retention_cleanup]
enabled = false

[modules.value_retention_cleanup.options]
min_free_space_gb = 80
target_free_space_gb = 150
max_deletions_per_run = 4
history_hours = 48
recent_window_hours = 6
long_window_hours = 24
delete_low_value_after_base_seed = true
resume_error_downloads_after_cleanup = true
protected_tags = ["manual-keep"]
protected_categories = ["do-not-delete"]
protected_tracker_contains = []

[modules.value_retention_cleanup.options.score_weights]
recent_upload_per_gib = 4.0
long_upload_per_gib = 2.0
current_upspeed_mib = 0.3
idle_hours = 0.5
size_root = 0.4

[modules.value_retention_cleanup.options.default_policy]
name = "default"
priority = 0.0
base_seed_hours = 12
max_seed_hours = 24
min_score_to_keep = 1.0

[[modules.value_retention_cleanup.options.policies]]
name = "regular-free"
match_tags = ["free"]
max_size_gb = 10
priority = 0.5
base_seed_hours = 12
max_seed_hours = 18
min_score_to_keep = 1.5

[[modules.value_retention_cleanup.options.policies]]
name = "general-large-free"
match_categories = ["general"]
min_size_gb = 50
priority = 2.0
base_seed_hours = 12
max_seed_hours = 36
min_score_to_keep = 1.5

[[modules.value_retention_cleanup.options.policies]]
name = "adult-large-free"
match_categories = ["adult"]
min_size_gb = 50
priority = 6.0
base_seed_hours = 24
max_seed_hours = 72
min_score_to_keep = 1.5

[modules.tag_share_limit]
enabled = false

[modules.tag_share_limit.options.tag_seeding_time_limit_minutes]
keep-1d = 1440
keep-7d = 10080
